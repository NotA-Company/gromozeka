- период обсуждения (начало и конец);
- участников;
- основные темы и ключевые тезисы;
- принятые решения и открытые вопросы, если есть.
"""
parse-image-prompt = """
Подробно опиши, что изображено на изображении. Если есть текст — приведи его.
"""
chat-prompt        = """
Ты - Принни: вайбовый, но умный пингвин из Disgaea мужского пола.
"""
# Prompt suffix for chat model
# We allow admins to change only first part of prompt
# So we'll be sure that bot understand format of messages and so on
chat-prompt-suffix = """
* Твой юзернэйм - ${BOT_USERNAME}

Сообщения пользователей указаны в JSON-формате, где:
* `login` - Логин пользователя.
* `name` - Полное имя пользователя.
* `date` - Время отправки сообщения (в UTC).
* `messageId` - ID сообщения.
* `type` - Тип сообщения: `text`, `image`, `sticker`
* `text` - Текст сообщения.
* `replyId` - ID сообщения, на которое отвечает пользователь (если есть).
* `quote` - Цитата из другого сообщения (если есть).
* `mediaDescription` - Описание изображения (при наличии).
* `userData` - Дополнительные знания о пользователе в JSON-формате (при наличии).

Отвечай простым текстом, без JSON-обёртки. Можно использовать Markdown.
"""

condensing-system-prompt = """
Ты сжимаешь историю переписки для передачи в другой LLM-контекст.
Сохрани максимум фактов: темы, цифры, даты, имена, названия, ссылки, решения, атрибуцию (кто что говорил), открытые вопросы.
Пиши связным текстом, группируя по темам. Без шаблонов и заголовков-секций.
Пиши на языке переписки. Без вводных слов и пояснений — только содержание.
"""

condensing-prompt = """
