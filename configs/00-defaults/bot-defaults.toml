[bot.tier-defaults.free]
# allow-tools-commands = false
[bot.private-defaults]
# Allow configure by default (Turn it of if you'll want to disable private)
# admin-can-change-settings = true

# Allow tools commands (/draw, /analyze, etc...)
# allow-tools-commands = true
# allow-mention = true
# allow-reply = true

# For private chats - Always answer something
random-answer-probability = 1
# The only user in Private chat is admin
random-answer-to-admin = true

# No spam possible in private chats
detect-spam = false

base-tier = "free-personal"

[bot.group-defaults]
# Can chat admins change channel-specific bot settings?
# admin-can-change-settings = true

# Allow tools commands (/draw, /analyze, etc...)
# allow-tools-commands = true
# Delete message with commands, which deniend in chat (for flood protection purposes)
# delete-denied-commands = false

# Allow reaction in bot mention (by username and by name)
# allow-mention = true
# Allow reaction on reply of bot message
# allow-reply = true

# Probability of random answer to any message (set 0 for disable, 1 for always)
# For chat it should be very rare event
# random-answer-probability = 0.01
# In case of random answer - answer to chat admin messages?
# random-answer-to-admin = true

# Automatically detect and delete spam messages
# detect-spam = false

[bot.channel-defaults]
# Channel defaults will be copied into channel settings instead of inheriting
# In channel all interactions with bot are disabled by default

use-tools = false
# Should we parse attachments via LLM
parse-attachments = false

# Allow tools commands (/draw, /analyze, etc...)
allow-tools-commands = false
# Delete message with commands, which deniend in chat (for flood protection purposes)
# delete-denied-commands = true

# Allow reaction in bot mention (by username and by name)
allow-mention = false
# Allow reaction on reply of bot message
allow-reply = false

# Probability of random answer to any message (set 0 for disable, 1 for always)
random-answer-probability = 0

# Automatically detect and delete spam messages
detect-spam = false
bayes-enabled = false

[bot.defaults]
# Can chat admins change chat-specific bot settings?
admin-can-change-settings = true
# Bot nicknames for mention purposes. Comma-separated list
bot-nicknames = "Громозека, Gro"
# Message format for LLM, currently supported: `text`, `json`, `smart`
llm-message-format = "smart"
# Can we use tools
use-tools = true
# Should we parse attachments via LLM
parse-attachments = true

# Should we save attachments to S3 for future using? (currently usefull for ResenderHandler only)
save-attachments = false
# Prefix for saved attachments
save-prefix = "media-"

# Allow tools commands (/draw, /analyze, etc...)
allow-tools-commands = true
# Delete message with commands, which deniend in chat (for flood protection purposes)
delete-denied-commands = false

# Allow non-admins to send /spam and /unban commands
allow-user-spam-command = false
# Automatically detect and delete spam messages
detect-spam = false
# If user has more than this amount of messages in chat, do not check it for spam (0 - always check)
auto-spam-max-messages = 10
# In case of spam - delete all known user messages
spam-delete-all-user-messages = true
# Minimal SPAM Score to block user and delete it's messages
spam-ban-treshold = 90
# Minimal SPAM Score to add warn message
spam-warn-treshold = 60
# Allow to block old (with more, than `auto-spam-max-messages` messages) users with /spam command
allow-mark-spam-old-users = false
bayes-min-confedence-to-autolearn-spam = 0.6
bayes-min-confedence-to-autolearn-ham = 0.9

# Deleteing join\left messages - default False

delete-join-messages = false
delete-left-messages = false

# Bayes filter settings
bayes-enabled = true
bayes-min-confidence = 0.5
bayes-auto-learn = true
# Should we use trigrams for Bayes filter? (Usefull only in case of lots of learned messages)
bayes-use-trigrams = false

# Allow reaction in bot mention (by username and by name)
allow-mention = true
# Allow reaction on reply of bot message
allow-reply = true

# Probability of random answer to any message (set 0 for disable, 1 for always)
random-answer-probability = 0.01
# In case of random answer - answer to chat admin messages?
random-answer-to-admin = true

tools-used-prefix        = "🛠"
fallback-happened-prefix = "🤖"
intermediate-message-prefix = "✍️"

# Default to free tier, also fill paid-tier with free tier as well
base-tier = "free"
paid-tier = "free"
paid-tier-untill-ts = 0

# Per-char ratelimiters for LLM usage and Tools-usage
llm-ratelimiter                 = "chat-default"

chat-model                      = "openrouter/mistral-7b-instruct:free"
fallback-model                  = "openrouter/gemma-3-12b-it:free"
summary-model                   = "openrouter/gemma-3-12b-it:free"
summary-fallback-model          = "openrouter/gpt-oss-20b:free"
image-parsing-model             = "openrouter/gemma-3-27b-it:free"
image-parsing-fallback-model    = "openrouter/qwen3-vl-235b-a22b-instruct"
image-generation-model          = "yandex-art"
image-generation-fallback-model = "openrouter/gemini-2.5-flash-image"
condensing-model                = "openrouter/gemma-3-27b-it:free"

summary-prompt     = "Суммаризируй пользовательские сообщения, предоставленные в JSON формате. Указывай время начала и конца обсуждения и пользователей, кто обсуждал."
parse-image-prompt = "Подробно опиши, что изображено на картинке"
chat-prompt        = """
Ты - Принни: вайбовый, но умный пингвин из Disgaea мужского пола.
"""
# Prompt suffix for chat model
# We allow admins to change only first part of prompt
# So we'll be sure that bot understand format of messages and so on
chat-prompt-suffix = """
Сообщения пользователей указаны в JSON-формате, где:
* `login` - Логин пользователя.
* `name` - Полное имя пользователя.
* `date` - Время отправки сообщения (в UTC).
* `messageId` - ID сообщения.
* `type` - Тип сообщения: `text`, `image`, `sticker`
* `text` - Текст сообщения.
* `replyId` - ID сообщения, на которое отвечает пользователь. Указывается, если пользователь отвечает на сообщение.
* `quote` - Цитата. Указывается, если пользователь в своём сообщении процитировал другое сообщение.
* `media_description` - Описание, что изображено на изображении (при наличии изображения).

Отвечай так же в JSON-формате, но заполняй только поле `text` (и `quote`, если нужно процитировать часть сообщения).
В Тексте сообщения можно использовать Markdown форматирование.
"""
condensing-prompt = """
Your task is to create a detailed summary of the conversation so far.
Output only the summary of the conversation so far, without any
additional commentary or explanation.
Answer using language of conversation, not language of this message."
"""
document-condensing-prompt = """
Сделай максимально подробный пересказ этого документа.
Сохраняй язык оригинала (не переводи), ответ так же давай на языке документа (не этого завпроса).
Включи все идеи, аргументы и факты. 
Структура пересказа должна соответствовать структуре исходного текста (разделы, подразделы).
Пересказывай исключительно на языке исходного текста.
"""
