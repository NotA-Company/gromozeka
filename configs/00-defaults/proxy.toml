# Global proxy configuration.
# Used by any service that sets use-proxy = true and does not provide
# its own [<service>.proxy] sub-section.
[proxy]
# Master kill-switch. When false, NO service uses proxy regardless of
# per-service use-proxy flags.
enabled = false

# Proxy type: "http" or "socks5"
type = "http"

# Full proxy address including scheme and port.
# Examples:
#   HTTP:   "http://proxy.example.com:8080"
#   SOCKS5: "socks5://proxy.example.com:1080"
# Use ${ENV_VAR} substitution for secrets.
address = ""

# Optional credentials for proxy authentication (Basic Auth for HTTP,
# username/password for SOCKS5). Leave empty if no auth is required.
# Use ${ENV_VAR} substitution — never commit credentials.
user = ""
password = ""

# --- Lifecycle management (optional) ---
# Omit this entire section to disable lifecycle management.
# When present, proxy lifecycle commands are executed at startup/shutdown,
# and health checks run periodically.
#
# [proxy.lifecycle]
# # Command to start the proxy process. Executed on application startup.
# # Array of strings (passed to asyncio.create_subprocess_exec).
# start-command = []
#
# # Command to stop the proxy process. Executed on application shutdown
# # and before restart (if no restart-command is provided).
# stop-command = []
#
# # Command to restart the proxy process. Optional.
# # If omitted, restart = stop-command + start-command sequentially.
# restart-command = []
#
# # Health check type: "none", "url", or "command".
# # "none" (default): no health monitoring, no CRON_JOB overhead.
# # "url": HTTP GET through the proxy to health-check-url; 2xx = pass.
# # "command": run health-check-command; exit 0 = pass.
# health-check-type = "none"
#
# # URL to probe when health-check-type = "url".
# health-check-url = ""
#
# # Command to run when health-check-type = "command".
# health-check-command = []
#
# # Health check interval in minutes. The CRON_JOB fires every ~60s;
# # the health check runs every Nth tick (gated by modulo counter).
# # Default: 5 (every 5 minutes).
# health-check-interval = 5

#
# # --- Example: SSH SOCKS5 tunnel ---
# # Uncomment and adjust for your jumpbox:
# #
# # [proxy]
# # enabled = true
# # type = "socks5"
# # address = "socks5://127.0.0.1:1080"
# #
# # [proxy.lifecycle]
# # start-command = ["ssh", "-D", "1080", "-N", "-q", "-o", "ServerAliveInterval=60", "user@jumpbox.example.com"]
# # stop-command = ["pkill", "-f", "ssh.*-D.*1080"]
# # # Optional: use a single restart command instead of stop+start.
# # # restart-command = ["your-restart-script.sh"]
# # health-check-type = "command"
# # health-check-command = ["nc", "-z", "127.0.0.1", "1080"]
# # # Alternative: URL-based health check through the proxy.
# # # health-check-type = "url"
# # # health-check-url = "https://api.example.com/health"
# # health-check-interval = 5
# #
# # The bot will:
# #   - Start the tunnel on boot.
# #   - Check it every 5 minutes (command or URL).
# #   - Restart on failure (stop+start, or restart-command if set).
# #   - Kill it on shutdown.
