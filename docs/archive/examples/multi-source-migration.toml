# Multi-Source Database Configuration - Migration Example
# This example shows how to migrate from single-database to multi-provider configuration
# with backward compatibility and step-by-step migration path

# ============================================================================
# STEP 1: SINGLE DATABASE (LEGACY MODE)
# ============================================================================
# Your current configuration (before migration):
#
# [database]
# default = "default"
#
# [database.providers.default]
# provider = "sqlite3"
#
# [database.providers.default.parameters]
# dbPath = "bot_data.db"
#
# Python code:
# from internal.database import Database
# config = {...}  # Load from config.toml
# db = Database(config=config)

# ============================================================================
# STEP 2: CONVERT TO MULTI-SOURCE (BACKWARD COMPATIBLE)
# ============================================================================
# First migration step - same functionality, new structure

[database]
default = "primary"

[database.providers.primary]
provider = "sqlite3"

[database.providers.primary.parameters]
dbPath = "bot.db"
readOnly = false
timeout = 30
useWal = true
keepConnection = true

# At this point, your bot works exactly the same as before!
# No chat mappings needed yet - everything uses "primary" provider

# ============================================================================
# STEP 3: ADD ARCHIVE PROVIDER (OPTIONAL)
# ============================================================================
# Once comfortable with multi-source, add an archive provider

# Uncomment to enable archive:
# [database.providers.archive]
# provider = "sqlink"
#
# [database.providers.archive.parameters]
# dbPath = "archive.db"
# readOnly = true  # Readonly for safety
# timeout = 10
# keepConnection = true

# ============================================================================
# STEP 4: MAP OLD CHATS TO ARCHIVE (OPTIONAL)
# ============================================================================
# Gradually move old/inactive chats to archive

# Uncomment and add your old chat IDs:
# [database.chatMapping]
# -1001234567890 = "archive"  # Old chat from 2023
# -1002345678901 = "archive"  # Another old chat

# ============================================================================
# STEP 5: ADD MORE PROVIDERS AS NEEDED (OPTIONAL)
# ============================================================================

# Example: Test provider for development
# [database.providers.test]
# provider = "sqlite3"
#
# [database.providers.test.parameters]
# dbPath = "test.db"
# readOnly = false
# timeout = 30
# useWal = true
# keepConnection = true

# Example: External bot provider (readonly)
# [database.providers.other_bot]
# provider = "sqlink"
#
# [database.providers.other_bot.parameters]
# dbPath = "/shared/other_bot.db"
# readOnly = true
# timeout = 10
# keepConnection = true

# ============================================================================
# MIGRATION CHECKLIST
# ============================================================================

# Before Migration:
# [ ] Backup your current database
# [ ] Test multi-provider config in development first
# [ ] Verify all existing functionality works

# During Migration:
# [ ] Start with Step 2 (single provider in multi-provider format)
# [ ] Test thoroughly before adding more providers
# [ ] Add archive provider (Step 3)
# [ ] Gradually map old chats to archive (Step 4)
# [ ] Monitor performance and adjust settings as needed

# After Migration:
# [ ] Verify all chats are accessible
# [ ] Check that writes work correctly
# [ ] Confirm readonly protection works
# [ ] Monitor connection usage
# [ ] Adjust configuration as needed

# ============================================================================
# ROLLBACK PLAN
# ============================================================================

# If you need to rollback to single-database mode:
# You can keep the multi-provider config with a single provider
# This is actually recommended - gives you flexibility for future

# ============================================================================
# COMMON MIGRATION ISSUES
# ============================================================================

# Issue 1: "Cannot perform write operation on readonly provider"
# Solution: Check if chat is mapped to readonly provider
#          Remove from chatMapping or change provider to writable

# Issue 2: "Provider 'name' not found in configuration"
# Solution: Verify provider name spelling in chatMapping
#          Ensure provider is defined in [database.providers.name]

# Issue 3: Performance degradation
# Solution: Adjust timeout values
#          Use explicit dataSource for known locations
#          Consider separating high-traffic chats to different providers

# ============================================================================
# BEST PRACTICES FOR MIGRATION
# ============================================================================

# 1. Start Simple
#    - Begin with single provider in multi-provider format
#    - Add complexity gradually

# 2. Test Thoroughly
#    - Test each migration step in development
#    - Verify backward compatibility

# 3. Monitor Performance
#    - Watch connection usage
#    - Adjust settings based on actual load

# 4. Use Readonly Wisely
#    - Mark archives as readonly
#    - Protect external/shared databases

# 5. Document Changes
#    - Keep track of chat mappings
#    - Document why chats are in specific providers

# ============================================================================
# EXAMPLE PYTHON CODE FOR MIGRATION
# ============================================================================

# Before (single database - old style):
# from internal.database import DatabaseWrapper
# db = DatabaseWrapper(dbPath="bot.db")

# After (multi-provider, backward compatible):
# from internal.database import Database
# from internal.config import ConfigManager
#
# configManager = ConfigManager()
# configManager.load(["--config-dir", "configs"])
# db = Database(config=configManager)

# Later (with archive):
# Just update config.toml to add archive provider and chat mapping
# No code changes needed!