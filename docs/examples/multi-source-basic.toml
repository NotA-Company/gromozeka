# Multi-Source Database Configuration - Basic Example
# This example shows a simple two-source setup with primary and archive databases

[database]
# Default source for operations without explicit routing
default = "primary"

# Primary database - main active bot database
[database.providers.primary]
provider = "sqlite3"

[database.providers.primary.parameters]
dbPath = "bot.db"
readOnly = false
timeout = 30
useWal = true
keepConnection = true  # Connect on creation and keep connection open

# Archive database - old/inactive chats (readonly for safety)
[database.providers.archive]
provider = "sqlink"

[database.providers.archive.parameters]
dbPath = "archive.db"
readOnly = true  # Prevents accidental modifications
timeout = 10
keepConnection = true  # Connect immediately (good for readonly replicas)

# Chat-to-provider mapping
# Map specific chats to specific providers
[database.chatMapping]
-1001234567890 = "archive"  # Old inactive chat
-1002345678901 = "archive"  # Another old chat
# All other chats use the default "primary" provider