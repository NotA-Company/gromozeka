# Multi-Source Database Configuration - Readonly-Only Example
# This example shows a read-only bot that queries multiple databases
# without any write permissions - perfect for monitoring, analytics, or reporting bots

[database]
# Default provider for read operations
default = "primary_readonly"

# ============================================================================
# DATA PROVIDERS - ALL READONLY
# ============================================================================

# Primary bot database (readonly access)
[database.providers.primary_readonly]
provider = "sqlite3"

[database.providers.primary_readonly.parameters]
dbPath = "/shared/primary_bot.db"
readOnly = true  # Readonly - this bot only reads, never writes
timeout = 30
keepConnection = true  # Connect immediately (good for readonly replicas)

# Archive database (readonly access)
[database.providers.archive_readonly]
provider = "sqlink"

[database.providers.archive_readonly.parameters]
dbPath = "/shared/archive.db"
readOnly = true
timeout = 10
keepConnection = true  # Connect immediately (good for readonly replicas)

# Another bot's database (readonly access)
[database.providers.bot2_readonly]
provider = "sqlite3"

[database.providers.bot2_readonly.parameters]
dbPath = "/shared/bot2.db"
readOnly = true
timeout = 10
keepConnection = true  # Connect immediately (good for readonly replicas)

# Analytics database (readonly access)
[database.providers.analytics_readonly]
provider = "sqlink"

[database.providers.analytics_readonly.parameters]
dbPath = "/shared/analytics.db"
readOnly = true
timeout = 10
keepConnection = true  # Connect immediately (good for readonly replicas)

# ============================================================================
# CHAT MAPPINGS (Optional for readonly bot)
# ============================================================================
# Even in readonly mode, you can map chats to specific providers
# This is useful for organizing queries across multiple databases

[database.chatMapping]
# Map chats to their respective providers
-1001111111111 = "primary_readonly"
-1002222222222 = "archive_readonly"
-1003333333333 = "bot2_readonly"

# ============================================================================
# USAGE EXAMPLES
# ============================================================================

# Example 1: Query specific readonly provider
# messages = db.getChatMessages(chatId=123, dataSource="primary_readonly")

# Example 2: Cross-provider aggregation (all readonly providers)
# all_chats = db.getAllGroupChats()  # Queries all providers safely

# Example 3: Analytics across multiple bots
# bot1_chats = db.getAllGroupChats(dataSource="primary_readonly")
# bot2_chats = db.getAllGroupChats(dataSource="bot2_readonly")

# Example 4: Archive analysis
# archive_messages = db.getChatMessages(chatId=123, dataSource="archive_readonly")

# ============================================================================
# PERFORMANCE NOTES
# ============================================================================

# Timeout Guidelines:
# - Local databases (primary, archive, analytics): 30 seconds (standard)
# - External databases (bot2): 10 seconds (faster failure for unavailable sources)

# Configuration Notes:
# - All providers marked as readOnly = true
# - keepConnection = true for all readonly providers (connect immediately)
# - Use sqlink for better async performance on readonly databases
# - No write operations allowed - enforced at provider level