# PostgreSQL database - production deployment with complex queries
# NOTE: postgresql provider exists but is NOT YET SELECTABLE
# [database.providers.postgres_production]
# provider = "postgresql"
#
# [database.providers.postgres_production.parameters]
# host = "postgres.example.com"
# port = 5432
# user = "gromozeka"
# password = "postgres_secure_password"
# database = "gromozeka_prod"
# readOnly = false
# keepConnection = false  # Connect on demand (default for PostgreSQL)

# ============================================================================
# CHAT MAPPINGS
# ============================================================================
# Map specific chats to specific providers
# Format: chatId = "providerName"

[database.chatMapping]

# Archive 2023 chats (inactive since 2023)
-1001111111111 = "archive_2023"
-1001222222222 = "archive_2023"
-1001333333333 = "archive_2023"

# Archive 2024 chats (inactive since 2024)
-1002111111111 = "archive_2024"
-1002222222222 = "archive_2024"

# Test chats (development/testing)
-1003111111111 = "test"
-1003222222222 = "test"

# Active production chats (explicitly mapped to primary)
-1004111111111 = "primary"
-1004222222222 = "primary"
-1004333333333 = "primary"

# Note: Chats not listed here will use the default provider ("primary")

# ============================================================================
# USAGE EXAMPLES
# ============================================================================

# Example 1: Query specific provider explicitly
# messages = db.getChatMessages(chatId=-1001111111111, dataSource="archive_2023")

# Example 2: Use chat mapping (automatic routing)
# messages = db.getChatMessages(chatId=-1001111111111)  # Routes to archive_2023

# Example 3: Cross-provider aggregation
# all_chats = db.getAllGroupChats()  # Queries all providers, deduplicates

# Example 4: Query external bot
# other_messages = db.getChatMessages(chatId=123, dataSource="other_bot")

# Example 5: Backup verification
# backup_data = db.getChatInfo(chatId=123, dataSource="backup")

# ============================================================================
# PERFORMANCE NOTES
# ============================================================================

# Timeout Guidelines:
# - Local databases (primary, archives, test): 30 seconds (standard)
# - External databases (other_bot): 10 seconds (faster failure for unavailable sources)
# - Backup storage: 60 seconds (may be on slower storage)

# Configuration Notes:
# - useWal (Write-Ahead Logging): Improves concurrency for SQLite databases
# - keepConnection: Use true for readonly sources, false for write-heavy sources
# - Provider selection: Currently only "sqlite3" and "sqlink" are selectable

# ============================================================================
# SECURITY NOTES
# ============================================================================

# Readonly sources provide protection against:
# - Accidental data modification
# - Unauthorized writes
# - Data corruption
# - Cross-bot interference

# Always mark these as readonly:
# - Archive databases
# - External bot databases
# - Backup databases
# - Shared databases
# - Read replicas

# ============================================================================
# CROSS-PROVIDER SUPPORT
# ============================================================================

# This configuration demonstrates mixing different database providers:
# - SQLite: primary, archives, test, backup (file-based, embedded)
# - MySQL: mysql_production (client-server, high concurrency)
# - PostgreSQL: postgres_production, postgres_replica (client-server, complex queries)

# Benefits of cross-provider setup:
# - Use SQLite for development and testing (zero configuration)
# - Use MySQL for high-concurrency production workloads
# - Use PostgreSQL for complex queries and analytics
# - Mix and match based on your specific needs
# - Seamless switching between providers with minimal code changes

# Provider-specific features:
# - SQLite: Zero configuration, file-based, perfect for development
# - MySQL: Connection pooling, async operations, enterprise-grade
# - PostgreSQL: Advanced data types, full-text search, read replicas

# For more information on SQL portability, see:
# - SQL Portability Guide: ../sql-portability-guide.md
# - MySQL Configuration: mysql-configuration.toml
# - PostgreSQL Configuration: postgresql-configuration.toml