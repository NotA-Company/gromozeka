# Multi-Source Database Configuration - Advanced Example
# This example demonstrates a complex multi-source setup with multiple database providers,
# custom settings, and sophisticated chat mappings
#
# NOTE: MySQL and PostgreSQL providers exist in codebase but are NOT YET SELECTABLE.
# Only sqlite3 and sqlink providers are currently registered for use.

[database]
# Default source for operations without explicit routing
default = "primary"

# ============================================================================
# DATA PROVIDERS
# ============================================================================

# Primary database - main active bot database
[database.providers.primary]
provider = "sqlite3"

[database.providers.primary.parameters]
dbPath = "bot.db"
readOnly = false
timeout = 30
useWal = true
keepConnection = true  # Connect on creation and keep connection open

# Archive database - old/inactive chats from 2023 and earlier
[database.providers.archive_2023]
provider = "sqlink"

[database.providers.archive_2023.parameters]
dbPath = "archive_2023.db"
readOnly = true  # Readonly for data integrity
timeout = 10
keepConnection = true  # Connect immediately (good for readonly replicas)

# Archive database - old/inactive chats from 2024
[database.providers.archive_2024]
provider = "sqlink"

[database.providers.archive_2024.parameters]
dbPath = "archive_2024.db"
readOnly = true
timeout = 10
keepConnection = true  # Connect immediately (good for readonly replicas)

# External bot database - read from another bot instance
[database.providers.other_bot]
provider = "sqlite3"

[database.providers.other_bot.parameters]
dbPath = "/shared/other_bot.db"
readOnly = true  # Never write to external bot's database
timeout = 10  # Shorter timeout for external database
keepConnection = true  # Connect immediately (good for readonly replicas)

# Test database - for development and testing
[database.providers.test]
provider = "sqlite3"

[database.providers.test.parameters]
dbPath = "test.db"
readOnly = false
timeout = 30
useWal = true
keepConnection = true  # Connect on creation and keep connection open

# Backup database - for disaster recovery queries
[database.providers.backup]
provider = "sqlite3"

[database.providers.backup.parameters]
dbPath = "/backups/bot_backup.db"
readOnly = true  # Never modify backups
timeout = 60  # Longer timeout for potentially slow backup storage
keepConnection = true  # Connect immediately (good for readonly replicas)

# ============================================================================
# FUTURE CONFIGURATION (Not Yet Selectable)
# ============================================================================

# MySQL database - production deployment with high concurrency
# NOTE: mysql provider exists but is NOT YET SELECTABLE
