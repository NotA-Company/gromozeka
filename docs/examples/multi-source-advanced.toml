# Multi-Source Database Configuration - Advanced Example
# This example demonstrates a complex multi-source setup with multiple databases,
# custom pool sizes, and sophisticated chat mappings

[database]
# Default source for operations without explicit routing
default = "primary"

# ============================================================================
# DATA SOURCES
# ============================================================================

# Primary database - main active bot database
[database.sources.primary]
path = "bot.db"
readonly = false
pool-size = 10  # High traffic, many concurrent operations
timeout = 30.0

[database.sources.primary.parameters]
keepConnection = false  # Connect on demand (default for file-based DBs)

# Archive database - old/inactive chats from 2023 and earlier
[database.sources.archive_2023]
path = "archive_2023.db"
readonly = true  # Readonly for data integrity
pool-size = 3    # Lower traffic, occasional queries
timeout = 30.0

[database.sources.archive_2023.parameters]
keepConnection = true  # Connect immediately (good for readonly replicas)

# Archive database - old/inactive chats from 2024
[database.sources.archive_2024]
path = "archive_2024.db"
readonly = true
pool-size = 3
timeout = 30.0

[database.sources.archive_2024.parameters]
keepConnection = true  # Connect immediately (good for readonly replicas)

# External bot database - read from another bot instance
[database.sources.other_bot]
path = "/shared/other_bot.db"
readonly = true  # Never write to external bot's database
pool-size = 2    # Minimal pool for occasional cross-bot queries
timeout = 10.0   # Shorter timeout for external database

[database.sources.other_bot.parameters]
keepConnection = true  # Connect immediately (good for readonly replicas)

# Test database - for development and testing
[database.sources.test]
path = "test.db"
readonly = false
pool-size = 5
timeout = 30.0

[database.sources.test.parameters]
keepConnection = false  # Connect on demand (default for file-based DBs)

# Backup database - for disaster recovery queries
[database.sources.backup]
path = "/backups/bot_backup.db"
readonly = true  # Never modify backups
pool-size = 1    # Minimal pool, rarely used
timeout = 60.0   # Longer timeout for potentially slow backup storage

[database.sources.backup.parameters]
keepConnection = true  # Connect immediately (good for readonly replicas)

# MySQL database - production deployment with high concurrency
[database.sources.mysql_production]
type = "mysql"
host = "mysql.example.com"
port = 3306
user = "gromozeka"
password = "mysql_secure_password"
database = "gromozeka_prod"
readonly = false
pool-size = 20  # High concurrency production database
timeout = 30.0

[database.sources.mysql_production.parameters]
keepConnection = false  # Connect on demand (default for MySQL)

# PostgreSQL database - production deployment with complex queries
[database.sources.postgres_production]
type = "postgresql"
host = "postgres.example.com"
port = 5432
user = "gromozeka"
password = "postgres_secure_password"
database = "gromozeka_prod"
readonly = false
pool-size = 15  # Production database with complex queries
timeout = 30.0

[database.sources.postgres_production.parameters]
keepConnection = false  # Connect on demand (default for PostgreSQL)

# PostgreSQL read replica - for read-heavy workloads
[database.sources.postgres_replica]
type = "postgresql"
host = "postgres-replica.example.com"
port = 5432
user = "gromozeka_readonly"
password = "readonly_password"
database = "gromozeka_prod"
readonly = true  # Read-only replica
pool-size = 10   # Read replica for analytics and reporting
timeout = 30.0

[database.sources.postgres_replica.parameters]
keepConnection = true  # Connect immediately (good for readonly replicas)

# ============================================================================
# CHAT MAPPINGS
# ============================================================================
# Map specific chats to specific data sources
# Format: chatId = "sourceName"

[database.chatMapping]

# Archive 2023 chats (inactive since 2023)
-1001111111111 = "archive_2023"
-1001222222222 = "archive_2023"
-1001333333333 = "archive_2023"

# Archive 2024 chats (inactive since 2024)
-1002111111111 = "archive_2024"
-1002222222222 = "archive_2024"

# Test chats (development/testing)
-1003111111111 = "test"
-1003222222222 = "test"

# Active production chats (explicitly mapped to primary)
-1004111111111 = "primary"
-1004222222222 = "primary"
-1004333333333 = "primary"

# Note: Chats not listed here will use the default source ("primary")

# ============================================================================
# USAGE EXAMPLES
# ============================================================================

# Example 1: Query specific source explicitly
# messages = db.getChatMessages(chatId=-1001111111111, dataSource="archive_2023")

# Example 2: Use chat mapping (automatic routing)
# messages = db.getChatMessages(chatId=-1001111111111)  # Routes to archive_2023

# Example 3: Cross-source aggregation
# all_chats = db.getAllGroupChats()  # Queries all sources, deduplicates

# Example 4: Query external bot
# other_messages = db.getChatMessages(chatId=123, dataSource="other_bot")

# Example 5: Backup verification
# backup_data = db.getChatInfo(chatId=123, dataSource="backup")

# Example 6: Query MySQL production database
# messages = db.chatMessages.getChatMessages(chatId=-1005000000000, dataSource="mysql_production")

# Example 7: Query PostgreSQL production database
# messages = db.chatMessages.getChatMessages(chatId=-1006000000000, dataSource="postgres_production")

# Example 8: Query PostgreSQL read replica (read-only operations)
# messages = db.chatMessages.getChatMessagesSince(chatId=-1006000000000, dataSource="postgres_replica")

# ============================================================================
# PERFORMANCE NOTES
# ============================================================================

# Pool Size Guidelines:
# - primary: 10 connections (high traffic, many concurrent operations)
# - archives: 3 connections (medium traffic, occasional queries)
# - other_bot: 2 connections (low traffic, cross-bot queries)
# - test: 5 connections (moderate traffic during development)
# - backup: 1 connection (minimal traffic, disaster recovery only)
# - mysql_production: 20 connections (high concurrency production database)
# - postgres_production: 15 connections (production database with complex queries)
# - postgres_replica: 10 connections (read replica for analytics and reporting)

# Timeout Guidelines:
# - Local databases: 30.0 seconds (standard)
# - External databases: 10.0 seconds (faster failure for unavailable sources)
# - Backup storage: 60.0 seconds (may be on slower storage)

# ============================================================================
# SECURITY NOTES
# ============================================================================

# Readonly sources provide protection against:
# - Accidental data modification
# - Unauthorized writes
# - Data corruption
# - Cross-bot interference

# Always mark these as readonly:
# - Archive databases
# - External bot databases
# - Backup databases
# - Shared databases
# - Read replicas

# ============================================================================
# CROSS-PROVIDER SUPPORT
# ============================================================================

# This configuration demonstrates mixing different database providers:
# - SQLite: primary, archives, test, backup (file-based, embedded)
# - MySQL: mysql_production (client-server, high concurrency)
# - PostgreSQL: postgres_production, postgres_replica (client-server, complex queries)

# Benefits of cross-provider setup:
# - Use SQLite for development and testing (zero configuration)
# - Use MySQL for high-concurrency production workloads
# - Use PostgreSQL for complex queries and analytics
# - Mix and match based on your specific needs
# - Seamless switching between providers with minimal code changes

# Provider-specific features:
# - SQLite: Zero configuration, file-based, perfect for development
# - MySQL: Connection pooling, async operations, enterprise-grade
# - PostgreSQL: Advanced data types, full-text search, read replicas

# For more information on SQL portability, see:
# - SQL Portability Guide: ../sql-portability-guide.md
# - MySQL Configuration: mysql-configuration.toml
# - PostgreSQL Configuration: postgresql-configuration.toml