# PostgreSQL Database Configuration Example
# This example demonstrates how to configure Gromozeka to use PostgreSQL as the database backend

[database]
# Default source for operations without explicit routing
default = "postgres_primary"

# ============================================================================
# DATA SOURCES
# ============================================================================

# Primary PostgreSQL database - main active bot database
[database.sources.postgres_primary]
type = "postgresql"
host = "localhost"
port = 5432
user = "gromozeka"
password = "your_secure_password"
database = "gromozeka_db"
readonly = false
pool-size = 10  # High traffic, many concurrent operations
timeout = 30

[database.sources.postgres_primary.parameters]
keepConnection = false  # Connect on demand (default for PostgreSQL)

# ============================================================================
# CHAT MAPPINGS
# ============================================================================
# Map specific chats to specific data sources
# Format: chatId = "sourceName"

[database.chatMapping]

# All chats will use the postgres_primary source by default
# You can map specific chats to different sources if needed
# -1001234567890 = "postgres_primary"

# ============================================================================
# USAGE EXAMPLES
# ============================================================================

# Example 1: Basic PostgreSQL connection
# The bot will automatically connect to PostgreSQL using the configuration above
# All database operations will be routed to the postgres_primary source

# Example 2: Query with explicit source
# messages = db.chatMessages.getChatMessages(chatId=-1001234567890, dataSource="postgres_primary")

# Example 3: Use chat mapping (automatic routing)
# messages = db.chatMessages.getChatMessages(chatId=-1001234567890)  # Routes to postgres_primary

# ============================================================================
# POSTGRESQL-SPECIFIC NOTES
# ============================================================================

# 1. Connection Pooling:
#    - PostgreSQL provider uses asyncpg.Pool for connection management
#    - pool-size controls the maximum number of connections in the pool
#    - Recommended pool-size: 5-20 depending on expected concurrent operations

# 2. Performance Considerations:
#    - PostgreSQL is well-suited for production deployments with complex queries
#    - Consider using read replicas for read-heavy workloads
#    - Use connection pooling to reduce connection overhead
#    - PostgreSQL's ILIKE operator provides efficient case-insensitive searches

# 3. Security:
#    - Always use strong passwords
#    - Consider using environment variables for sensitive data
#    - Restrict database user permissions to only what's needed
#    - Use SSL/TLS for connections in production

# 4. Backup and Maintenance:
#    - Regular backups using pg_dump or pgBackRest
#    - Monitor connection pool usage and adjust pool-size as needed
#    - Set up monitoring for slow queries and connection issues
#    - Consider using VACUUM and ANALYZE for maintenance

# 5. Advanced Features:
#    - PostgreSQL supports advanced data types (JSON, arrays, etc.)
#    - Full-text search capabilities
#    - Extensions for additional functionality
#    - Robust transaction support and MVCC

# ============================================================================
# ADVANCED CONFIGURATION
# ============================================================================

# Example: Multiple PostgreSQL databases for different purposes
# [database.sources.postgres_archive]
# type = "postgresql"
# host = "archive-db.example.com"
# port = 5432
# user = "gromozeka_readonly"
# password = "readonly_password"
# database = "gromozeka_archive"
# readonly = true
# pool-size = 3
# timeout = 30

# Example: PostgreSQL with custom connection settings
# [database.sources.postgres_custom]
# type = "postgresql"
# host = "custom-db.example.com"
# port = 5433  # Custom port
# user = "gromozeka"
# password = "custom_password"
# database = "gromozeka_custom"
# readonly = false
# pool-size = 15
# timeout = 60  # Longer timeout for remote database

# Example: PostgreSQL with connection string (alternative format)
# [database.sources.postgres_connection_string]
# type = "postgresql"
# connection_string = "postgresql://gromozeka:password@localhost:5432/gromozeka_db"
# readonly = false
# pool-size = 10
# timeout = 30

# ============================================================================
# ENVIRONMENT VARIABLE SUPPORT
# ============================================================================

# You can use environment variables for sensitive configuration:
# [database.sources.postgres_primary]
# type = "postgresql"
# host = "${POSTGRES_HOST}"
# port = "${POSTGRES_PORT}"
# user = "${POSTGRES_USER}"
# password = "${POSTGRES_PASSWORD}"
# database = "${POSTGRES_DATABASE}"

# ============================================================================
# REQUIREMENTS
# ============================================================================

# To use PostgreSQL provider, install the required dependency:
# pip install asyncpg

# For more information, see:
# - SQL Portability Guide: ../sql-portability-guide.md
# - PostgreSQL Provider: ../../internal/database/providers/postgresql.py
